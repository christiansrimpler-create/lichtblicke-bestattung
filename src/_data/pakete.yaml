    hinweis: '**Hinweis:** Die Kosten für den Beisetzungsort sind nicht im Preis enthalten, da sie je nach Friedhof und Bestattungsart variieren. Wir beraten Sie individuell und finden gemeinsam die passende Lösung.'
  - name: Komfortpaket Anonyme Bestattung
    art: Feuerbestattung
    stufe: Anonym
    preis: 3.000,00 €
    preis_zusatz: inkl. 19 % MwSt ***
    beschreibung: Die anonyme Feuerbestattung ohne Trauerfeier – komplett organisiert inklusive Kremation, mit Überführung vom Sterbeort in Freiburg und Umgebung.
    leistungen:
      - Persönliche und einfühlsame Beratung – telefonisch oder in einem persönlichen Gespräch vor Ort
      - Abholung der verstorbenen Person sowie würdevolle Überführung vom Sterbeort zum Krematorium und anschließend zum Beisetzungsort innerhalb Freiburg und Umgebung.
      - Fachgerechte Kühlung ab dem Zeitpunkt der Abholung
      - Sorgfältige Versorgung der verstorbenen Person, Ankleiden mit Sterbehemd und würdevolle Einbettung
      - Organisation der Einäscherung einschließlich der gesetzlich vorgeschriebenen zweiten Leichenschau sowie aller anfallenden Leistungen des Krematoriums
      - Sichere Verwahrung der Urne bis zum Termin der Beisetzung
      - Anmeldung der Beisetzung und Überführung der Urne zum gewünschten Friedhof oder Beisetzungsort
      - Erledigung der Formalitäten beim Standesamt, einschließlich Sterbefallanzeige und Beantragung einer Sterbeurkunde
      - Abmeldung bei Krankenkasse und Rentenversicherung sowie – sofern möglich – Beantragung des Sterbevierteljahres (dreimonatige Übergangsrente für Witwen und Witwer)
      - 'Auf Wunsch: Beschaffung fehlender Unterlagen wie Eheurkunde oder Scheidungsurteil innerhalb Deutschlands (Aufpreis 50 €)'
    lieferungen:
      - Schlichter Einäscherungssarg inklusive Innenausstattung
      - Sterbehemd
    hinweis: |-
      **Hinweis:** Die Kosten für den Beisetzungsort sind nicht im Preis enthalten, da sie je nach Friedhof und Bestattungsart variieren. Wir beraten Sie individuell und finden gemeinsam die passende Lösung.

      Außerdem erhält das Grab bei einer anonymen Bestattung keine namentliche Kennzeichnung.
weitere:
  - name: Paket „Abschiedsfeier“
    tag: Zusatzpaket
    preis: 600,00 €
    beschreibung: Jeder Mensch ist einzigartig – und genauso individuell sollte auch der Abschied gestaltet werden. Ob mit einer persönlichen Trauerrede, eigenen Worten der Familie oder einer schlichten musikalischen Abschiedsfeier – wir begleiten Sie bei der Planung und Umsetzung einer würdevollen Zeremonie.
    leistungen_titel: Das Paket beinhaltet
    leistungen:
      - Persönliche Organisation und Begleitung der Abschiedsfeier
      - Feierdauer von ca. 30 Minuten
      - Gedrucktes Foto im Format A3, gerahmt (Leihrahmen) und auf einer Staffelei präsentiert
      - Schlichte und stilvolle Dekoration inklusive Blütenblättern
      - Vorbereitung der gewünschten Musik sowie Bereitstellung einer Musikanlage
      - Terminabstimmung mit dem Feierort
      - Individuelle Beratung und Unterstützung bei der Gestaltung der Abschiedsfeier
    text: Auf Wunsch organisieren wir auch zusätzlichen Blumenschmuck, Kerzen, besondere Rituale oder weitere persönliche Elemente. Dafür arbeiten wir mit zuverlässigen regionalen Partnern zusammen. Über eventuell entstehende Zusatzkosten informieren wir Sie selbstverständlich im Voraus und transparent.
  - name: Paket „Aufbahrung am Hauptfriedhof Freiburg“
    tag: Zusatzpaket
    preis: 300,00 € (1 Tag)
    beschreibung: Die Aufbahrung bietet Angehörigen die Möglichkeit, in ruhiger und würdevoller Atmosphäre persönlich Abschied zu nehmen. Sie schafft Raum für einen letzten gemeinsamen Moment vor der Beisetzung oder der Trauerfeier.
    leistungen_titel: Das Paket beinhaltet
    leistungen:
      - Organisation und Terminabstimmung der Aufbahrung
      - Aufbahrung im Aufbahrungsraum des Hauptfriedhofs für einen Tag
      - Persönliche Beratung und Begleitung bei der Terminplanung
      - Koordination mit der Friedhofsverwaltung
    text: 'Preis: 300,00 € für den ersten Tag, jeder weitere Tag 60,00 €.'
  - name: Individuelles Wunschpaket
    tag: Individuell
    preis: Preis auf Anfrage
    beschreibung: Sie haben besondere Wünsche oder möchten einzelne Leistungen ganz nach Ihren Vorstellungen gestalten? Kein Problem. Gemeinsam finden wir eine passende und würdevolle Lösung, die Ihren persönlichen Bedürfnissen entspricht.
    leistungen_titel: ''
    text: Sprechen Sie uns einfach an – wir nehmen uns Zeit für Ihre Anliegen und setzen alles daran, Ihre Wünsche nach Möglichkeit zu erfüllen. Gerne erstellen wir Ihnen ein individuelles Angebot, das genau auf Ihre Vorstellungen und Anforderungen abgestimmt ist.
