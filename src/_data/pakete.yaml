      - Überführung zu einem Friedhof in Freiburg und Umgebung
      - Vorbereitung und Gestaltung der Trauerfeier vor der Beerdigung inkl. Katafalkdecke, Tüchern, Kerzen und Blumenschmuck
      - Erledigung sämtlicher Formalitäten (Standesamt, Krankenkasse, Rente, Übergangsrente)
    lieferungen:
