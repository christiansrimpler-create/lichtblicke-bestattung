pakete:
  - name: Feuerbestattung StandardPaket
    art: Feuerbestattung
    stufe: Standard
    preis: 2.250,00 €
    preis_zusatz: inkl. 19 % MwSt **
    beschreibung: Die Einäscherung ohne Trauerfeier, zwei Tagen Abschiednahme und erweitertem Überführungsgebiet rund um Freiburg.
    leistungen:
      - Beratung zur Feuerbestattung. Auf Wunsch organisieren wir zusätzlich eine Trauerfeier inklusive Grab- und Friedhofswahl, Sarg, Blumenschmuck, Dekoration, Trauermusik sowie der Terminabstimmung mit Behörden, Pfarramt und Organist.
      - Überführung vom Sterbeort in Freiburg und Umgebung (Gundelfingen, Heuweiler, Denzlingen, Vörstetten, March, Umkirch, Merzhausen, Au, Ebringen, Schallstadt), inkl. Überführungstrage mit Hygienelaken
      - Hygienische Grundversorgung, Ankleiden mit Sterbetalar oder eigener Kleidung, Einbetten in den Sarg
      - Aufbewahrung in einem Kühlraum *
      - Zwei Tage Abschiednahme in einem Aufbahrungsraum am Hauptfriedhof
      - Überführung zum Krematorium in Saußheim sowie Rückholung der Aschenkapsel
      - Vorbereitung und Gestaltung der Trauer- bzw. Urnenabschiedsfeier inkl. Katafalkdecke, Tüchern, Kerzen und Blumenschmuck
      - Überführung der Urne zu einem Friedhof in Freiburg und Umgebung
      - Erledigung sämtlicher Formalitäten (Standesamt, Krankenkasse, Rente, Übergangsrente)
    lieferungen:
      - Schlichter Kiefernsarg
      - Herren- oder Damentalar in Weiß
      - Schlichte Decke und Kissen aus Viskose mit Volant in Weiß
      - Urnenkapsel
      - Schmuckurne (Naturstoff, einfach)
    hinweis: '**Hinweis:** Die Kosten für den Beisetzungsort sind nicht im Preis enthalten, da sie je nach Friedhof und Bestattungsart variieren. Wir beraten Sie individuell und finden gemeinsam die passende Lösung.'
  - name: Erdbestattung StandardPaket
    art: Erdbestattung
    stufe: Standard
    preis: 2.800,00 €
    preis_zusatz: inkl. 19 % MwSt **
    beschreibung: Die Erdbestattung ohne Trauerfeier, zwei Tagen Abschiednahme und erweitertem Überführungsgebiet rund um Freiburg.
    leistungen:
      - Beratung zur Feuerbestattung. Auf Wunsch organisieren wir zusätzlich eine Trauerfeier inklusive Grab- und Friedhofswahl, Sarg, Blumenschmuck, Dekoration, Trauermusik sowie der Terminabstimmung mit Behörden, Pfarramt und Organist.
      - Überführung vom Sterbeort in Freiburg und Umgebung (Gundelfingen, Heuweiler, Denzlingen, Vörstetten, March, Umkirch, Merzhausen, Au, Ebringen, Schallstadt), inkl. Überführungstrage mit Hygienelaken
      - Hygienische Grundversorgung, Ankleiden mit Sterbetalar oder eigener Kleidung, Einbetten in den Sarg
      - Aufbewahrung in einem Kühlraum *
      - Zwei Tage Abschiednahme in einem Aufbahrungsraum am Hauptfriedhof
      - Überführung zu einem Friedhof in Freiburg und Umgebung
      - Vorbereitung und Gestaltung der Trauerfeier vor der Beerdigung inkl. Katafalkdecke, Tüchern, Kerzen und Blumenschmuck
      - Erledigung sämtlicher Formalitäten (Standesamt, Krankenkasse, Rente, Übergangsrente)
    lieferungen:
      - Kiefernsarg, Vollholz, gebeizt, mit Kehlung im Oberteil und vier Griffen, Innenausschlag aus Viskose
