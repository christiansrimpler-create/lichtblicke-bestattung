pakete:
  - name: Feuerbestattung StandardPaket
    art: Feuerbestattung
    stufe: Standard
    preis: 2.250,00 €
    preis_zusatz: inkl. 19 % MwSt **
    beschreibung: Die Einäscherung mit Trauerfeier, zwei Tagen Abschiednahme und erweitertem Überführungsgebiet rund um Freiburg.
    leistungen:
      - 'Beratung für eine Feuerbestattung mit Trauerfeier: Grab- und Friedhofswahl, Sarg, Blumenschmuck, Dekoration, Trauermusik, Termine mit Behörden, Pfarramt und Organist'
      - Überführung vom Sterbeort in Freiburg und Umgebung (Gundelfingen, Heuweiler, Denzlingen, Vörstetten, March, Umkirch, Merzhausen, Au, Ebringen, Schallstadt), inkl. Überführungstrage mit Hygienelaken
      - Hygienische Grundversorgung, Ankleiden mit Sterbetalar oder eigener Kleidung, Einbetten in den Sarg
      - Aufbewahrung in einem Kühlraum *
      - Zwei Tage Abschiednahme in einem Aufbahrungsraum am Hauptfriedhof
      - Überführung zum Krematorium in Saußheim sowie Rückholung der Aschenkapsel
      - Vorbereitung und Gestaltung der Trauer- bzw. Urnenabschiedsfeier inkl. Katafalkdecke, Tüchern, Kerzen und Blumenschmuck
      - Überführung der Urne zu einem Friedhof in Freiburg und Umgebung
      - Erledigung sämtlicher Formalitäten (Standesamt, Krankenkasse, Rente, Übergangsrente)
    lieferungen:
      - Schlichter Kiefernsarg
      - Herren- oder Damentalar in Weiß
      - Schlichte Decke und Kissen aus Viskose mit Volant in Weiß
      - Urnenkapsel
      - Schmuckurne (Naturstoff, einfach)
    hinweis: ''
