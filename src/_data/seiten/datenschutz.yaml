# Texte der Datenschutzerklärung. Die Verantwortlichen-Daten kommen aus
# einstellungen.yaml. Layout steckt in src/datenschutz.njk.

eyebrow: "Rechtliches"
titel: "Datenschutzerklärung"
h_verantwortlich: "Verantwortlicher"
abschnitte:
  - heading: "Erhebung von Daten beim Besuch dieser Website"
    text: "Beim Aufrufen unserer Website werden durch den Browser automatisch Informationen an den Server unserer Website gesendet (z. B. IP-Adresse, Datum und Uhrzeit des Zugriffs, aufgerufene Seite, übertragene Datenmenge, Browsertyp). Diese Daten dienen der technischen Auslieferung und Sicherheit der Website und werden nicht mit anderen Datenquellen zusammengeführt."
  - heading: "Hosting"
    text: "Diese Website wird bei GitHub Inc., 88 Colin P. Kelly Jr. Street, San Francisco, CA 94107, USA, gehostet (GitHub Pages). Beim Aufruf der Seiten verarbeitet GitHub die unter „Erhebung von Daten“ genannten technischen Zugriffsdaten, insbesondere Ihre IP-Adresse, in Server-Logfiles, um die Website auszuliefern und die Sicherheit des Dienstes zu gewährleisten. Rechtsgrundlage ist unser berechtigtes Interesse an einer sicheren und zuverlässigen Bereitstellung der Website (Art. 6 Abs. 1 lit. f DSGVO). GitHub ist unter dem EU-US Data Privacy Framework zertifiziert. Schriften und alle weiteren Inhalte dieser Website werden lokal von diesem Server geladen; es werden keine Schriften von Google-Servern eingebunden."
  - heading: "Kontaktaufnahme"
    text: "Wenn Sie uns per Telefon oder E-Mail kontaktieren, werden Ihre Angaben zur Bearbeitung Ihrer Anfrage und für mögliche Anschlussfragen gespeichert. Diese Daten geben wir nicht ohne Ihre Einwilligung weiter."
  - heading: "Karten-Einbindung (OpenStreetMap)"
    text: "Zur Anzeige unseres Standorts binden wir eine Karte von OpenStreetMap ein. Dabei kann Ihre IP-Adresse an den Kartendienst übermittelt werden. Anbieter ist die OpenStreetMap Foundation."
  - heading: "Ihre Rechte"
    text: "Sie haben das Recht auf Auskunft, Berichtigung, Löschung, Einschränkung der Verarbeitung, Datenübertragbarkeit sowie Widerspruch. Wenden Sie sich dazu an die oben genannten Kontaktdaten. Zudem steht Ihnen ein Beschwerderecht bei einer Datenschutz-Aufsichtsbehörde zu."
hinweis: "Hinweis: Diese Datenschutzerklärung ist eine Grundfassung für die neue Seite und sollte vor dem endgültigen Livegang rechtlich geprüft und an die tatsächlich eingesetzten Dienste angepasst werden."
